<div class="le-overlay" *ngIf="visible" (click)="onCancel()">
  <div class="le-panel le-panel--wide" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">

    <div class="le-header">
      <span class="le-title">Edit Planning &mdash; {{ planning?.planningName }}</span>
      <button class="le-close" (click)="onCancel()" aria-label="Close">&times;</button>
    </div>

    <form [formGroup]="form" class="le-body" (ngSubmit)="onSave()">
      <div class="le-grid">

        <div class="le-field" [class.le-field--error]="hasError('planningName')">
          <label for="pe-planningName">Planning Name *</label>
          <input id="pe-planningName" type="text" formControlName="planningName" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('planningName')">Required</span>
        </div>

        <div class="le-field" [class.le-field--error]="hasError('contactName')">
          <label for="pe-contactName">Contact Name *</label>
          <input id="pe-contactName" type="text" formControlName="contactName" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('contactName')">Required</span>
        </div>

        <div class="le-field" [class.le-field--error]="hasError('dealName')">
          <label for="pe-dealName">Deal Name *</label>
          <input id="pe-dealName" type="text" formControlName="dealName" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('dealName')">Required</span>
        </div>

        <div class="le-field" [class.le-field--error]="hasError('visitType')">
          <label for="pe-visitType">Visit Type *</label>
          <select id="pe-visitType" formControlName="visitType">
            <option value="">— Select —</option>
            <option *ngFor="let v of visitTypeOptions" [value]="v">{{ v }}</option>
          </select>
          <span class="le-error-msg" *ngIf="hasError('visitType')">Required</span>
        </div>

        <div class="le-field" [class.le-field--error]="hasError('serviceCategory')">
          <label for="pe-serviceCategory">Service Category *</label>
          <input id="pe-serviceCategory" type="text" formControlName="serviceCategory" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('serviceCategory')">Required</span>
        </div>

        <div class="le-field" [class.le-field--error]="hasError('language')">
          <label for="pe-language">Language *</label>
          <input id="pe-language" type="text" formControlName="language" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('language')">Required</span>
        </div>

        <div class="le-field" [class.le-field--error]="hasError('arrival')">
          <label for="pe-arrival">Arrival *</label>
          <input id="pe-arrival" type="datetime-local" formControlName="arrival" />
          <span class="le-error-msg" *ngIf="hasError('arrival')">Required</span>
        </div>

        <div class="le-field" [class.le-field--error]="hasError('operationStatus')">
          <label for="pe-operationStatus">Operation Status *</label>
          <select id="pe-operationStatus" formControlName="operationStatus">
            <option value="">— Select —</option>
            <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
          </select>
          <span class="le-error-msg" *ngIf="hasError('operationStatus')">Required</span>
        </div>

        <div class="le-field" [class.le-field--error]="hasError('planningOwner')">
          <label for="pe-planningOwner">Planning Owner *</label>
          <input id="pe-planningOwner" type="text" formControlName="planningOwner" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('planningOwner')">Required</span>
        </div>

      </div>

      <div class="le-footer">
        <button type="button" class="le-btn le-btn--secondary" (click)="onCancel()">Cancel</button>
        <button type="submit" class="le-btn le-btn--primary">Save Update</button>
      </div>
    </form>
  </div>
</div>
