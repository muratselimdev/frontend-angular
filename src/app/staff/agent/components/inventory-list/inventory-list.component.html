<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-semibold text-gray-800">Envanter Fişleri</h2>
    <a routerLink="/staff/inventory/new" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors">
      <i class="fas fa-plus mr-2"></i> Yeni Fiş Oluştur
    </a>
  </div>

  <div *ngIf="isLoading" class="flex justify-center p-8">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
  </div>

  <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ error }}
  </div>

  <div *ngIf="!isLoading && !error" class="bg-white shadow-md rounded-lg overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fiş No</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tarih</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tip</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Durum</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">İşlemler</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let item of inventories" class="hover:bg-gray-50">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">#{{ item.id }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ item.ficheNo }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ item.createdAt | date:'short' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            <span *ngIf="item.type === 1" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">Tip 1</span>
            <span *ngIf="item.type !== 1" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">Diğer</span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            <span *ngIf="item.status === 0" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">Bekliyor</span>
            <span *ngIf="item.status === 1" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Onaylandı</span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <a [routerLink]="['/staff/inventory', item.id]" class="text-indigo-600 hover:text-indigo-900 mr-3">
              <mat-icon class="align-middle">edit</mat-icon>
            </a>
          </td>
        </tr>
        <tr *ngIf="inventories.length === 0">
          <td colspan="6" class="px-6 py-4 text-center text-sm text-gray-500">
            Henüz hiç fiş bulunmamaktadır.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
