<div class="le-overlay" *ngIf="visible" (click)="onCancel()">
  <div class="le-panel" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">

    <div class="le-header">
      <span class="le-title">Edit Lead &mdash; #{{ lead?.leadId }}</span>
      <button class="le-close" (click)="onCancel()" aria-label="Close">&times;</button>
    </div>

    <form [formGroup]="form" class="le-body" (ngSubmit)="onSave()">

      <div class="le-grid">

        <!-- Lead Name -->
        <div class="le-field" [class.le-field--error]="hasError('leadName')">
          <label for="le-leadName">Lead Name *</label>
          <input id="le-leadName" type="text" formControlName="leadName" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('leadName')">Required</span>
        </div>

        <!-- Phone -->
        <div class="le-field" [class.le-field--error]="hasError('phone')">
          <label for="le-phone">Phone *</label>
          <input id="le-phone" type="text" formControlName="phone" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('phone')">Required</span>
        </div>

        <!-- Service Category -->
        <div class="le-field" [class.le-field--error]="hasError('serviceCategory')">
          <label for="le-serviceCategory">Service Category *</label>
          <input id="le-serviceCategory" type="text" formControlName="serviceCategory" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('serviceCategory')">Required</span>
        </div>

        <!-- Service -->
        <div class="le-field" [class.le-field--error]="hasError('service')">
          <label for="le-service">Service *</label>
          <input id="le-service" type="text" formControlName="service" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('service')">Required</span>
        </div>

        <!-- Language -->
        <div class="le-field" [class.le-field--error]="hasError('language')">
          <label for="le-language">Language *</label>
          <input id="le-language" type="text" formControlName="language" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('language')">Required</span>
        </div>

        <!-- Lead Source -->
        <div class="le-field" [class.le-field--error]="hasError('leadSource')">
          <label for="le-leadSource">Lead Source *</label>
          <input id="le-leadSource" type="text" formControlName="leadSource" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('leadSource')">Required</span>
        </div>

        <!-- Campaign Name -->
        <div class="le-field" [class.le-field--error]="hasError('campaignName')">
          <label for="le-campaignName">Campaign Name *</label>
          <input id="le-campaignName" type="text" formControlName="campaignName" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('campaignName')">Required</span>
        </div>

        <!-- Lead Status -->
        <div class="le-field" [class.le-field--error]="hasError('leadStatus')">
          <label for="le-leadStatus">Lead Status *</label>
          <select id="le-leadStatus" formControlName="leadStatus">
            <option value="">— Select —</option>
            <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
          </select>
          <span class="le-error-msg" *ngIf="hasError('leadStatus')">Required</span>
        </div>

        <!-- Lead Owner -->
        <div class="le-field" [class.le-field--error]="hasError('leadOwner')">
          <label for="le-leadOwner">Lead Owner *</label>
          <input id="le-leadOwner" type="text" formControlName="leadOwner" autocomplete="off" />
          <span class="le-error-msg" *ngIf="hasError('leadOwner')">Required</span>
        </div>

      </div>

      <div class="le-footer">
        <button type="button" class="le-btn le-btn--secondary" (click)="onCancel()">Cancel</button>
        <button type="submit" class="le-btn le-btn--primary">Save Update</button>
      </div>

    </form>
  </div>
</div>
