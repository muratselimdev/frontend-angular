<div class="agent-topbar">
  <button type="button" class="hamburger-button" (click)="toggleNavigationMenu()" aria-label="Menüyü aç">
    <mat-icon>menu</mat-icon>
  </button>

  <form class="search-form" (ngSubmit)="performSearch()">
    <mat-icon class="search-icon">search</mat-icon>
    <input
      [(ngModel)]="searchTerm"
      name="topbarSearch"
      type="search"
      placeholder="Ara..."
      aria-label="Ara" />
  </form>

  <div class="topbar-actions">
    <button type="button" class="icon-button" (click)="toggleDarkMode()" [attr.aria-label]="isDarkMode ? 'Light mode' : 'Dark mode'">
      <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <div class="menu-wrapper">
      <button type="button" class="icon-button" (click)="toggleNotifications($event)" aria-label="Bildirimler">
        <mat-icon>notifications_none</mat-icon>
        <span *ngIf="unreadCount > 0" class="notification-dot">{{ unreadCount }}</span>
      </button>

      <div *ngIf="notificationsOpen" class="dropdown-panel notifications-panel">
        <div class="dropdown-header">
          <strong>Bildirimler</strong>
        </div>
        <div *ngFor="let item of notifications" class="notification-item">
          <div>
            <div class="item-title">{{ item.title }}</div>
            <div class="item-description">{{ item.description }}</div>
          </div>
          <small>{{ item.time }}</small>
        </div>
      </div>
    </div>

    <div class="menu-wrapper">
      <button type="button" class="icon-button language-button" (click)="toggleLanguageMenu($event)" aria-label="Dil seçimi">
        <mat-icon>language</mat-icon>
        <span class="lang-text">{{ currentLanguage | uppercase }}</span>
      </button>

      <div *ngIf="languageMenuOpen" class="dropdown-panel small-panel">
        <button type="button" class="dropdown-action" (click)="switchLanguage('tr')">
          <mat-icon>translate</mat-icon>
          Türkçe
        </button>
        <button type="button" class="dropdown-action" (click)="switchLanguage('en')">
          <mat-icon>translate</mat-icon>
          English
        </button>
      </div>
    </div>

    <div class="menu-wrapper user-wrapper">
      <button type="button" class="user-trigger" (click)="toggleUserMenu($event)">
        <div class="avatar">{{ getUserInitial() }}</div>
        <div class="user-meta">
          <strong>{{ getUserName() }}</strong>
          <small>{{ getUserEmail() }}</small>
        </div>
        <mat-icon class="caret">expand_more</mat-icon>
      </button>

      <div *ngIf="userMenuOpen" class="dropdown-panel user-panel">
        <div class="user-summary">
          <div class="avatar large">{{ getUserInitial() }}</div>
          <div>
            <div class="item-title">{{ getUserName() }}</div>
            <div class="item-description">{{ getUserEmail() }}</div>
          </div>
        </div>

        <button type="button" class="dropdown-action" (click)="navigateToProfile()">
          <mat-icon>person_outline</mat-icon>
          Profili düzenle
        </button>
        <button type="button" class="dropdown-action" (click)="navigateToSettings()">
          <mat-icon>tune</mat-icon>
          Hesap ayarları
        </button>
        <button type="button" class="dropdown-action" (click)="navigateToSettings('password')">
          <mat-icon>lock_reset</mat-icon>
          Şifre değiştir
        </button>
        <button type="button" class="dropdown-action" (click)="navigateToSupport()">
          <mat-icon>support_agent</mat-icon>
          Destek
        </button>

        <div class="dropdown-divider"></div>

        <button type="button" class="dropdown-action danger" (click)="logout()">
          <mat-icon>logout</mat-icon>
          Çıkış yap
        </button>
      </div>
    </div>
  </div>
</div>
