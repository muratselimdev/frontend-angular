<div class="contacts-container">
  <div class="contacts-header">
    <h2>Contacts</h2>
  </div>

  <div class="table-wrapper">
    <div *ngIf="loading" class="loading-state">Loading...</div>

    <table *ngIf="!loading" class="contacts-table">
      <thead>
        <tr>
          <th class="edit-col"></th>
          <th class="checkbox-col">
            <input
              type="checkbox"
              [checked]="allSelected"
              [indeterminate]="someSelected"
              (change)="toggleSelectAll($event)"
              title="Select all"
            />
          </th>
          <th class="notes-col" title="Notes">📝</th>
          <th class="task-flag-col">-</th>
          <th *ngFor="let col of orderedColumns"
              [class.pinned-col]="isPinned(col.key)"
              [style.left]="isPinned(col.key) ? getPinnedLeft(col.key) : null"
              [style.min-width.px]="isPinned(col.key) ? 130 : null">
            <div class="th-inner">
              <span class="th-label" (click)="sortBy(col.key)">
                {{ col.label }}&nbsp;<span class="sort-icon">{{ getSortIcon(col.key) }}</span>
              </span>
              <button
                class="pin-btn"
                [class.pin-active]="isPinned(col.key)"
                [disabled]="!canPin(col.key)"
                (click)="togglePin(col.key, $event)"
                [title]="isPinned(col.key) ? 'Unpin column' : 'Pin column'">
                &#128204;
              </button>
            </div>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let contact of sortedContacts">
          <td class="edit-col"><button class="edit-row-btn" (click)="openContactEditModal(contact)" title="Edit">&#9998;</button></td>
          <td class="checkbox-col">
            <input
              type="checkbox"
              [checked]="isSelected(contact.contactId)"
              (change)="toggleSelectContact(contact.contactId)"
            />
          </td>
          <td class="notes-col">
            <button
              class="note-btn"
              [class.has-notes]="hasNotes(contact)"
              title="Notes">
              📝
              <span class="note-count" *ngIf="hasNotes(contact)">{{ getNotesCount(contact) }}</span>
            </button>
          </td>
          <td class="task-flag-col">
            <div [class]="'task-flag-rectangle ' + getTaskFlagClass(contact)" *ngIf="contact.taskDueDate">
              <span class="flag-month">{{ getTaskFlagMonth(contact) }}</span>
              <span class="flag-day">{{ getTaskFlagDay(contact) }}</span>
            </div>
          </td>
          <td *ngFor="let col of orderedColumns"
              [class.pinned-col]="isPinned(col.key)"
              [style.left]="isPinned(col.key) ? getPinnedLeft(col.key) : null"
              [style.min-width.px]="isPinned(col.key) ? 130 : null">
            <span *ngIf="col.key === 'statusId'" class="badge" [class]="getStatusClass(getCellValue(contact, col.key))">{{ getCellValue(contact, col.key) }}</span>
            <span *ngIf="col.key === 'phone'" class="phone-cell">
              <span>{{ getCellValue(contact, col.key) }}</span>
              <button class="call-btn" (click)="startCall(contact)" title="Call">
                <div class="call-icon">☎️</div>
                <div class="call-label">call</div>
              </button>
            </span>
            <span *ngIf="col.key !== 'statusId' && col.key !== 'phone'" [class.contact-name]="col.key === 'contactName'">{{ getCellValue(contact, col.key) }}</span>
          </td>
        </tr>
        <tr *ngIf="contacts.length === 0">
          <td [attr.colspan]="orderedColumns.length + 4" class="empty-state">No contacts found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<app-contact-edit
  [visible]="showContactEditModal"
  [contact]="selectedContactForEdit"
  (save)="onContactEditSave($event)"
  (cancel)="closeContactEditModal()">
</app-contact-edit>
