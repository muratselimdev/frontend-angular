<div class="deals-container">
  <div class="deals-header">
    <h2>Deals</h2>
  </div>

  <div class="table-wrapper">
    <div *ngIf="loading" class="loading-state">Loading...</div>

    <table *ngIf="!loading" class="deals-table">
      <thead>
        <tr>
          <th class="edit-col"></th>
          <th class="checkbox-col">
            <input
              type="checkbox"
              [checked]="allSelected"
              [indeterminate]="someSelected"
              (change)="toggleSelectAll($event)"
              title="Select all"
            />
          </th>
          <th class="notes-col" title="Notes">📝</th>
          <th class="task-flag-col">-</th>
          <th *ngFor="let col of orderedColumns"
              [class.pinned-col]="isPinned(col.key)"
              [style.left]="isPinned(col.key) ? getPinnedLeft(col.key) : null"
              [style.min-width.px]="isPinned(col.key) ? 140 : null">
            <div class="th-inner">
              <span class="th-label" (click)="sortBy(col.key)">
                {{ col.label }}&nbsp;<span class="sort-icon">{{ getSortIcon(col.key) }}</span>
              </span>
              <button
                class="pin-btn"
                [class.pin-active]="isPinned(col.key)"
                [disabled]="!canPin(col.key)"
                (click)="togglePin(col.key, $event)"
                [title]="isPinned(col.key) ? 'Unpin column' : 'Pin column'">
                &#128204;
              </button>
            </div>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let deal of sortedDeals; let dealIdx = index">
          <td class="edit-col"><button class="edit-row-btn" (click)="openDealEditModal(deal)" title="Edit">&#9998;</button></td>
          <td class="checkbox-col">
            <input
              type="checkbox"
              [checked]="isSelected(dealIdx)"
              (change)="toggleSelectDeal(dealIdx)"
            />
          </td>
          <td class="notes-col">
            <button
              class="note-btn"
              [class.has-notes]="hasNotes(deal)"
              title="Notes">
              📝
              <span class="note-count" *ngIf="hasNotes(deal)">{{ getNotesCount(deal) }}</span>
            </button>
          </td>
          <td class="task-flag-col">
            <div [class]="'task-flag-rectangle ' + getTaskFlagClass(deal)" *ngIf="deal.taskDueDate">
              <span class="flag-month">{{ getTaskFlagMonth(deal) }}</span>
              <span class="flag-day">{{ getTaskFlagDay(deal) }}</span>
            </div>
          </td>
          <td *ngFor="let col of orderedColumns"
              [class.pinned-col]="isPinned(col.key)"
              [style.left]="isPinned(col.key) ? getPinnedLeft(col.key) : null"
              [style.min-width.px]="isPinned(col.key) ? 140 : null">

            <ng-container [ngSwitch]="col.key">

              <span *ngSwitchCase="'stage'" class="badge" [class]="getStageClass(getCellValue(deal, col.key))">
                {{ getCellValue(deal, col.key) }}
              </span>

              <span *ngSwitchCase="'dealName'" class="deal-name">
                {{ getCellValue(deal, col.key) }}
              </span>

              <span *ngSwitchCase="'amount'" class="amount">
                {{ getCellValue(deal, col.key) }}
              </span>

              <span *ngSwitchDefault>{{ getCellValue(deal, col.key) }}</span>

            </ng-container>
          </td>
        </tr>
        <tr *ngIf="deals.length === 0">
          <td [attr.colspan]="orderedColumns.length + 4" class="empty-state">No deals found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<app-deal-edit
  [visible]="showDealEditModal"
  [deal]="selectedDealForEdit"
  (save)="onDealEditSave($event)"
  (cancel)="closeDealEditModal()">
</app-deal-edit>
