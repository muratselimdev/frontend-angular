<div class="agent-layout">
  <button
    *ngIf="isTabletSidebarOpen"
    type="button"
    class="sidebar-backdrop"
    (click)="closeTabletSidebar()"
    aria-label="Menüyü kapat"
  ></button>

  <!-- 🔹 Sol Menü -->
  <aside class="sidebar" [class.sidebar-open]="isTabletSidebarOpen">
    <div class="sidebar-header text-center py-3">
      <h3>🎧 Agent Panel</h3>
    </div>

    <!-- 📞 Gelen çağrı popup -->
    <app-call-incoming-modal
      *ngIf="incomingVisible"
      [visible]="incomingVisible"
      [callerName]="callerName"
      (accept)="onAcceptCall()"
      (reject)="onRejectCall()">
    </app-call-incoming-modal>

    <nav class="mt-3">
      <ul class="list-unstyled">
        <li *ngFor="let item of menuItems">
          <a
            [routerLink]="item.path"
            (click)="navigateTo(item.path, $event)"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: !item.children?.length }"
            class="d-flex align-items-center px-3 py-2">
            <span *ngIf="item.icon" class="me-2">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>

          <ul *ngIf="item.children?.length" class="submenu list-unstyled mt-1 ms-3">
            <li *ngFor="let child of item.children">
              <a
                [routerLink]="child.path"
                (click)="navigateTo(child.path, $event)"
                routerLinkActive="active"
                class="submenu-link d-flex align-items-center px-3 py-2">
                <span *ngIf="child.icon" class="me-2">{{ child.icon }}</span>
                <span>{{ child.label }}</span>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- 🔹 İçerik Alanı -->
  <main class="content p-3">
    <app-agent-topbar (menuToggle)="toggleTabletSidebar()"></app-agent-topbar>

    <!-- 🎧 Aktif Çağrı Bilgisi -->
    <!-- <div *ngIf="callActive" class="alert alert-success text-center p-2 mb-2 shadow-sm">
      🎙️ Arama devam ediyor...
      <button class="btn btn-danger btn-sm ms-2" (click)="endCall()">
        <i class="bi bi-telephone-x"></i> Durdur
      </button>
    </div> -->

    <!-- 🔹 Sayfa içerikleri -->
    <router-outlet></router-outlet>
  </main>

  <!-- 🔊 Uzak taraf sesi (WebRTC için) -->
  <audio id="remoteAudio" autoplay></audio>
</div>
