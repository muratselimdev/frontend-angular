<div class="agent-layout">
  <button *ngIf="isTabletSidebarOpen" type="button" class="sidebar-backdrop" (click)="closeTabletSidebar()"
    aria-label="Close menu"></button>

  <aside class="sidebar" [class.sidebar-open]="isTabletSidebarOpen" [class.sidebar-collapsed]="isSidebarCollapsed"
    [class.resizing]="isResizing" [style.width.px]="isSidebarCollapsed ? 0 : sidebarWidth">
    <div class="sidebar-header">
      <a routerLink="/agent" class="sidebar-brand" (click)="closeTabletSidebar()" aria-label="OneClinic">
        <span class="sidebar-brand__mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" focusable="false">
            <path d="M20 3.6 34.2 11.8v16.4L20 36.4 5.8 28.2V11.8L20 3.6Z" />
            <path d="M20 10.4 28.3 15.2v9.6L20 29.6l-8.3-4.8v-9.6L20 10.4Z" />
            <path d="M20 14.6 24.7 17.3v5.4L20 25.4l-4.7-2.7v-5.4L20 14.6Z" />
          </svg>
        </span>
        <span class="sidebar-brand__copy">
          <span class="sidebar-brand__name">OneClinic</span>
          <span class="sidebar-brand__subtitle">Healthcare ERP</span>
        </span>
      </a>

      <button type="button" class="sidebar-collapse-button" (click)="toggleTabletSidebar()" aria-label="Menüyü daralt">
        <mat-icon>menu</mat-icon>
      </button>
    </div>

    <!-- resize handle -->
    <div class="resize-handle" (mousedown)="startResize($event)"></div>

    <!-- 📞 Gelen çağrı popup -->
    <app-call-incoming-modal *ngIf="incomingVisible" [visible]="incomingVisible" [callerName]="callerName"
      (accept)="onAcceptCall()" (reject)="onRejectCall()">
    </app-call-incoming-modal>

    <nav class="sidebar-nav" aria-label="Agent menüsü">
      <ul class="sidebar-menu">
        <ng-container *ngFor="let item of menuItems; let i = index">
          <li *ngIf="i === 0" class="sidebar-section-item">
            <span class="sidebar-section-label">Genel</span>
          </li>
          <li *ngIf="item.children?.length" class="sidebar-section-item">
            <span class="sidebar-section-label">Envanter</span>
          </li>
          <li class="sidebar-menu-item" [class.sidebar-menu-item--children]="item.children?.length">
          <a [routerLink]="item.children?.length ? null : item.path"
            (click)="item.children?.length ? toggleMenu(item, $event) : navigateTo(item.path, $event)"
            [class.active]="!item.children?.length && isItemActive(item)"
            [class.parent-active]="item.children?.length && isItemActive(item)"
            [class.menu-open]="item.children?.length && isMenuOpen(item)"
            class="sidebar-link">
            <span class="sidebar-link__label">{{ item.label }}</span>
            <div class="sidebar-link__actions">
              <span
                *ngIf="item.children?.length"
                class="submenu-toggle"
                role="button"
                tabindex="0"
                (click)="toggleMenu(item, $event)"
                (keydown.enter)="toggleMenu(item, $event)"
                (keydown.space)="toggleMenu(item, $event)"
                [attr.aria-label]="isMenuOpen(item) ? 'Menüyü kapat' : 'Menüyü aç'"
              >
                <mat-icon>{{ isMenuOpen(item) ? 'expand_less' : 'expand_more' }}</mat-icon>
              </span>
            </div>
          </a>

          <ul *ngIf="item.children?.length && isMenuOpen(item)" class="submenu">
            <li *ngFor="let child of item.children">
              <a *ngIf="isItemVisible(child)" [routerLink]="child.path" (click)="navigateTo(child.path, $event)"
                [class.active]="isItemActive(child)" class="submenu-link">
                <mat-icon *ngIf="child.icon" class="sidebar-icon sidebar-icon--child">{{ child.icon }}</mat-icon>
                <span class="sidebar-link__label">{{ child.label }}</span>
              </a>
            </li>
          </ul>
          </li>
        </ng-container>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/agent/support" class="sidebar-support-card sidebar-support-card--light" (click)="closeTabletSidebar()">
        <span class="sidebar-support-card__icon" aria-hidden="true">
          <mat-icon>support_agent</mat-icon>
        </span>
        <span>
          <strong>Destek Merkezi</strong>
          <small>7/24 hızlı destek alın</small>
        </span>
        <mat-icon class="sidebar-support-card__arrow">chevron_right</mat-icon>
      </a>

      <button type="button" class="sidebar-minimize" (click)="toggleTabletSidebar()">
        <mat-icon>radio_button_checked</mat-icon>
        <span>Menüyü Daralt</span>
        <mat-icon>chevron_left</mat-icon>
      </button>
    </div>
  </aside>

  <!-- 🔹 İçerik Alanı -->
  <main class="content p-3">
    <app-agent-topbar (menuToggle)="toggleTabletSidebar()"></app-agent-topbar>

    <!-- 🎧 Aktif Çağrı Bilgisi -->
    <!-- <div *ngIf="callActive" class="alert alert-success text-center p-2 mb-2 shadow-sm">
      🎙️ Arama devam ediyor...
      <button class="btn btn-danger btn-sm ms-2" (click)="endCall()">
        <i class="bi bi-telephone-x"></i> Durdur
      </button>
    </div> -->

    <!-- 🔹 Sayfa içerikleri -->
    <router-outlet></router-outlet>
  </main>

  <!-- 🔊 Uzak taraf sesi (WebRTC için) -->
  <audio id="remoteAudio" autoplay></audio>
</div>
